<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基本図形編集</title>
    <link rel="stylesheet" href="../common/btron-theme.css">
    <link rel="stylesheet" href="style.css?v=20251023">
</head>
<body>
    <div class="plugin-content">
        <div class="editor-container">
            <!-- メインキャンバス -->
            <canvas id="figureCanvas" class="figure-canvas"></canvas>
        </div>
    </div>

    <!-- ロガーをグローバル変数として読み込み（最初に読み込む必要がある） -->
    <script type="module">
        import { getLogger, LogLevel, logManager } from '../../js/logger.js';
        window.getLogger = getLogger;
        window.LogLevel = LogLevel;
        window.logManager = logManager;
    </script>
    <!-- アイコンキャッシュマネージャー -->
    <script type="module">
        import { IconCacheManager } from '../../js/icon-cache-manager.js';
        window.IconCacheManager = IconCacheManager;
    </script>
    <!-- グローバル設定 -->
    <script type="module">
        import { CONFIG } from '../../js/config.js';
        window.TADjsConfig = CONFIG;
    </script>
    <script type="module" src="../../tad.js?v=20251023"></script>
    <!-- VirtualObjectRendererをグローバル変数として読み込み -->
    <script type="module">
        import { VirtualObjectRenderer } from '../../js/virtual-object-renderer.js';
        window.VirtualObjectRenderer = VirtualObjectRenderer;
    </script>
    <!-- 共通ユーティリティと定数をグローバル変数として読み込み -->
    <script type="module">
        import {
            convertPtToPx, rgbToHex, hexToRgb, invertColor,
            DEFAULT_TIMEOUT_MS, LONG_OPERATION_TIMEOUT_MS, ICON_LOAD_TIMEOUT_MS,
            VOBJ_BORDER_WIDTH, VOBJ_TITLEBAR_PADDING_VERTICAL, VOBJ_PADDING_VERTICAL,
            DEFAULT_FONT_SIZE, DEFAULT_VOBJ_HEIGHT, DEFAULT_LINE_HEIGHT,
            DEFAULT_FRCOL, DEFAULT_CHCOL, DEFAULT_TBCOL, DEFAULT_BGCOL,
            LIST_SELECTED_BG_COLOR, GRAY_COLOR,
            DEFAULT_MASK_DEFINITIONS
        } from '../../js/util.js';
        window.convertPtToPx = convertPtToPx;
        window.rgbToHex = rgbToHex;
        window.hexToRgb = hexToRgb;
        window.invertColor = invertColor;
        window.DEFAULT_TIMEOUT_MS = DEFAULT_TIMEOUT_MS;
        window.LONG_OPERATION_TIMEOUT_MS = LONG_OPERATION_TIMEOUT_MS;
        window.ICON_LOAD_TIMEOUT_MS = ICON_LOAD_TIMEOUT_MS;
        window.VOBJ_BORDER_WIDTH = VOBJ_BORDER_WIDTH;
        window.VOBJ_TITLEBAR_PADDING_VERTICAL = VOBJ_TITLEBAR_PADDING_VERTICAL;
        window.VOBJ_PADDING_VERTICAL = VOBJ_PADDING_VERTICAL;
        window.DEFAULT_FONT_SIZE = DEFAULT_FONT_SIZE;
        window.DEFAULT_VOBJ_HEIGHT = DEFAULT_VOBJ_HEIGHT;
        window.DEFAULT_LINE_HEIGHT = DEFAULT_LINE_HEIGHT;
        window.DEFAULT_FRCOL = DEFAULT_FRCOL;
        window.DEFAULT_CHCOL = DEFAULT_CHCOL;
        window.DEFAULT_TBCOL = DEFAULT_TBCOL;
        window.DEFAULT_BGCOL = DEFAULT_BGCOL;
        window.LIST_SELECTED_BG_COLOR = LIST_SELECTED_BG_COLOR;
        window.GRAY_COLOR = GRAY_COLOR;
        window.DEFAULT_MASK_DEFINITIONS = DEFAULT_MASK_DEFINITIONS;
    </script>
    <!-- 図形計算ユーティリティをグローバル変数として読み込み -->
    <script type="module">
        import { GeometryUtils } from '../../js/geometry-utils.js';
        window.GeometryUtils = GeometryUtils;
    </script>
    <!-- 用紙サイズ関連をグローバル変数として読み込み -->
    <script type="module">
        import { PaperSize, PaperMargin, PAPER_SIZES, getPaperSizeOptions, pointsToMm, mmToPoints } from '../../js/paper-size.js';
        window.PaperSize = PaperSize;
        window.PaperMargin = PaperMargin;
        window.PAPER_SIZES = PAPER_SIZES;
        window.getPaperSizeOptions = getPaperSizeOptions;
        window.pointsToMm = pointsToMm;
        window.mmToPoints = mmToPoints;
    </script>
    <!-- パフォーマンス最適化ユーティリティをグローバル変数として読み込み -->
    <script type="module">
        import { debounce, throttle, throttleRAF } from '../../js/performance-utils.js';
        window.debounce = debounce;
        window.throttle = throttle;
        window.throttleRAF = throttleRAF;
    </script>
    <!-- メッセージバスをグローバル変数として読み込み -->
    <script type="module">
        import { MessageBus } from '../../js/message-bus.js';
        window.MessageBus = MessageBus;
    </script>
    <!-- 実身仮身システムをグローバル変数として読み込み -->
    <script type="module">
        import { RealObjectSystem } from '../../js/real-object-system.js';
        window.RealObjectSystem = RealObjectSystem;
    </script>
    <script src="../../js/uuid-v7.js"></script>
    <!-- プラグイン共通基底クラスをグローバル変数として読み込み -->
    <script type="module">
        import { PluginBase } from '../../js/plugin-base.js';
        window.PluginBase = PluginBase;
    </script>
    <!-- Mixinモジュールをグローバル変数として読み込み -->
    <script type="module">
        import { FigureXmlParserMixin } from './figure-xml-parser.js';
        import { FigureXmlSerializerMixin } from './figure-xml-serializer.js';
        import { FigurePropertyApplierMixin } from './figure-property-applier.js';
        import { FigureConnectorMixin } from './figure-connector-mixin.js';
        import { FigureToolPanelMixin } from './figure-tool-panel-mixin.js';
        import { FigureSelectionMixin } from './figure-selection-mixin.js';
        import { FigureClipboardMixin } from './figure-clipboard-mixin.js';
        import { FigureEventHandlerMixin } from './figure-event-handler-mixin.js';
        import { FigureVirtualObjectMixin } from './figure-virtual-object-mixin.js';
        window.FigureXmlParserMixin = FigureXmlParserMixin;
        window.FigureXmlSerializerMixin = FigureXmlSerializerMixin;
        window.FigurePropertyApplierMixin = FigurePropertyApplierMixin;
        window.FigureConnectorMixin = FigureConnectorMixin;
        window.FigureToolPanelMixin = FigureToolPanelMixin;
        window.FigureSelectionMixin = FigureSelectionMixin;
        window.FigureClipboardMixin = FigureClipboardMixin;
        window.FigureEventHandlerMixin = FigureEventHandlerMixin;
        window.FigureVirtualObjectMixin = FigureVirtualObjectMixin;
    </script>
    <!-- パターン定義（js/pattern-utils.jsからグローバル変数に登録） -->
    <script type="module" src="default-patterns.js"></script>
    <script type="module" src="editor.js?v=20251023"></script>
</body>
</html>
