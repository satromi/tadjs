<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基本動画再生</title>
    <link rel="stylesheet" href="../../tadjs-desktop.css">
    <link rel="stylesheet" href="../common/btron-theme.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player-container" id="playerContainer">
        <div class="media-container" id="mediaContainer">
            <!-- メディア要素がここに動的に追加される -->
        </div>
        <div class="no-media-message" id="noMediaMessage">
            メディアファイルがありません
        </div>
        <!-- シークバーコントロール -->
        <div class="seekbar-container" id="seekbarContainer">
            <!-- コントロールボタン -->
            <div class="seekbar-controls">
                <button class="seekbar-btn" id="btnShuffle" title="シャッフル">🔀</button>
                <button class="seekbar-btn" id="btnPrevious" title="前のトラック">|◀</button>
                <button class="seekbar-btn" id="btnPlayPause" title="再生/一時停止">▶</button>
                <button class="seekbar-btn" id="btnNext" title="次のトラック">▶|</button>
                <button class="seekbar-btn" id="btnRepeat" title="リピート">🔁</button>
            </div>
            <div class="seekbar-time" id="currentTime">00:00:00</div>
            <div class="seekbar-track" id="seekbarTrack">
                <div class="seekbar-progress" id="seekbarProgress"></div>
                <input type="range" class="seekbar-slider" id="seekbarSlider" min="0" max="100" value="0">
            </div>
            <div class="seekbar-time" id="totalTime">00:00:00</div>
        </div>
        <!-- ホバー検出エリア（下部10%） -->
        <div class="seekbar-hover-area" id="seekbarHoverArea"></div>
    </div>

    <!-- jsmediatags: ID3タグ解析ライブラリ -->
    <script src="../../lib/jsmediatags/jsmediatags.min.js"></script>
    <!-- ロガーをグローバル変数として読み込み -->
    <script type="module">
        import { getLogger, LogLevel, logManager } from '../../js/logger.js';
        window.getLogger = getLogger;
        window.LogLevel = LogLevel;
        window.logManager = logManager;
    </script>
    <!-- グローバル設定 -->
    <script type="module">
        import { CONFIG } from '../../js/config.js';
        window.TADjsConfig = CONFIG;
    </script>
    <!-- アイコンキャッシュマネージャー -->
    <script type="module">
        import { IconCacheManager } from '../../js/icon-cache-manager.js';
        window.IconCacheManager = IconCacheManager;
    </script>
    <!-- VirtualObjectRendererをグローバル変数として読み込み -->
    <script type="module">
        import { VirtualObjectRenderer } from '../../js/virtual-object-renderer.js';
        window.VirtualObjectRenderer = VirtualObjectRenderer;
    </script>
    <!-- 実身仮身システムをグローバル変数として読み込み -->
    <script type="module">
        import { RealObjectSystem } from '../../js/real-object-system.js';
        window.RealObjectSystem = RealObjectSystem;
    </script>
    <!-- メッセージバスをグローバル変数として読み込み -->
    <script type="module">
        import { MessageBus } from '../../js/message-bus.js';
        window.MessageBus = MessageBus;
    </script>
    <!-- プラグイン共通基底クラスをグローバル変数として読み込み -->
    <script type="module">
        import { PluginBase } from '../../js/plugin-base.js';
        window.PluginBase = PluginBase;
    </script>
    <!-- メインアプリケーション -->
    <script type="module" src="app.js"></script>
</body>
</html>
