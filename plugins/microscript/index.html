<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイクロスクリプト</title>
    <link rel="stylesheet" href="../common/btron-theme.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="plugin-content">
        <canvas id="stage" tabindex="0"></canvas>
        <div id="message-area"></div>
    </div>

    <script type="module">
        import { getLogger, LogLevel, logManager } from '../../js/logger.js';
        window.getLogger = getLogger;
        window.LogLevel = LogLevel;
        window.logManager = logManager;

        import { CONFIG } from '../../js/config.js';
        window.TADjsConfig = CONFIG;

        import { DEFAULT_TIMEOUT_MS, LONG_OPERATION_TIMEOUT_MS, DEFAULT_MASK_DEFINITIONS } from '../../js/util.js';
        window.DEFAULT_TIMEOUT_MS = DEFAULT_TIMEOUT_MS;
        window.LONG_OPERATION_TIMEOUT_MS = LONG_OPERATION_TIMEOUT_MS;
        window.DEFAULT_MASK_DEFINITIONS = DEFAULT_MASK_DEFINITIONS;

        import { createFillPattern, buildPatternFromTadParams } from '../../js/pattern-utils.js';
        window.createFillPattern = createFillPattern;
        window.buildPatternFromTadParams = buildPatternFromTadParams;

        import { MessageBus } from '../../js/message-bus.js';
        window.MessageBus = MessageBus;

        import { PluginBase } from '../../js/plugin-base.js';
        window.PluginBase = PluginBase;

        const loadScript = (src) => new Promise((resolve, reject) => {
            const s = document.createElement('script');
            s.src = src;
            s.onload = resolve;
            s.onerror = reject;
            document.body.appendChild(s);
        });

        (async () => {
            // srconv (内部→シフトJIS/EUC 変換) 用の encoding ライブラリ (失敗してもフォールバックで継続)
            try { await loadScript('../../encoding.min.js'); } catch (e) { /* 未配置環境では簡易変換 */ }
            await loadScript('figure-tad-reader.js');
            await loadScript('canvas-stage.js');
            await loadScript('script-loader.js');
            await loadScript('ms-lexer.js');
            await loadScript('ms-parser.js');
            await loadScript('ms-runtime.js');
            await loadScript('app.js');
        })();
    </script>
</body>
</html>
